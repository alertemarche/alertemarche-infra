# AlerteMarché — Stack de DÉVELOPPEMENT
# Environnement local avec ports exposés et rechargement facilité.
services:
  app:
    build:
      context: ../alertemarche-backend
      dockerfile: Dockerfile
    container_name: alertemarche_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../alertemarche-backend:/var/www/html
    env_file: ../alertemarche-backend/.env
    depends_on:
      - postgres
      - redis
    networks:
      - alertemarche

  nginx:
    image: nginx:alpine
    container_name: alertemarche_nginx_dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../alertemarche-backend:/var/www/html
      - ./nginx/alertemarche.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - alertemarche

  postgres:
    image: postgres:15-alpine
    container_name: alertemarche_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: alertemarche
      POSTGRES_USER: alertemarche
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - alertemarche

  redis:
    image: redis:7-alpine
    container_name: alertemarche_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - alertemarche

volumes:
  pgdata_dev:

networks:
  alertemarche:
    driver: bridge
