# AlerteMarché — configuration Nginx
# Sert le frontend statique et relaie l'API vers Laravel (PHP-FPM).
# HTTP (80) + HTTPS (443, certificat compatible Cloudflare Origin / mode Full).

# Bloc commun réutilisé par les deux serveurs (80 et 443).
# --- Server HTTP (port 80) ---
server {
    listen 80;
    listen [::]:80;
    server_name alertemarche.com www.alertemarche.com _;

    client_max_body_size 20M;

    # Les appels internes des scrapers passent par http://nginx/api : on NE
    # redirige donc PAS l'API vers HTTPS pour préserver ces appels container-à-container.
    location /api {
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Tout le reste (pages HTML) est redirigé vers HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Server HTTPS (port 443) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name alertemarche.com www.alertemarche.com _;

    # Certificat auto-signé (accepté par Cloudflare en mode Full).
    ssl_certificate     /etc/nginx/ssl/alertemarche.crt;
    ssl_certificate_key /etc/nginx/ssl/alertemarche.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # En-têtes de sécurité de base.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # ---- Frontend statique ----
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    # Pages HTML : jamais mises en cache durablement (toujours revalider).
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri.html $uri/ =404;
    }

    # CSS/JS : non versionnés → revalidation systématique (ETag / Last-Modified).
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Images / polices : stables → cache long autorisé.
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # ---- API Laravel (PHP-FPM) ----
    location /api {
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Bloque l'accès aux fichiers sensibles.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
