# AlerteMarché — Nginx vhost pour alertemarche.com
# SSL géré par Cloudflare (mode Full). Ce serveur écoute en HTTP interne
# et sert l'application Laravel via PHP-FPM (service "app").

upstream php_backend {
    server app:9000;
}

server {
    listen 80;
    server_name alertemarche.com www.alertemarche.com;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 20M;

    # Sécurité de base
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
    }

    # Fichiers statiques : cache long
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 30d;
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
