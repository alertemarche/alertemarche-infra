# AlerteMarché — configuration Nginx
# Sert le frontend statique et relaie l'API vers Laravel (PHP-FPM).
# HTTP uniquement : Cloudflare assure le TLS (mode Full).

server {
    listen 80;
    listen [::]:80;
    server_name alertemarche.com www.alertemarche.com _;

    # En-têtes de sécurité de base.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # ---- Frontend statique ----
    root /usr/share/nginx/html;
    index index.html;

    # Redirige la racine vers la page d'accueil.
    location = / {
        try_files /index.html =404;
    }

    # Fichiers statiques + fallback .html (URL sans extension).
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache long pour les assets.
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ---- API Laravel (PHP-FPM) ----
    # Toutes les requêtes /api/* sont traitées par le front controller Laravel.
    location /api {
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Bloque l'accès aux fichiers sensibles.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
