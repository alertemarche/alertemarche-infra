# AlerteMarché — Stack de PRODUCTION
# Déployée sur le VPS, derrière Cloudflare (WAF / DDoS / SSL).
services:
  app:
    image: ghcr.io/alertemarche/alertemarche-backend:latest
    container_name: alertemarche_app
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - alertemarche

  queue:
    image: ghcr.io/alertemarche/alertemarche-backend:latest
    container_name: alertemarche_queue
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90
    env_file: .env
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - alertemarche

  scheduler:
    image: ghcr.io/alertemarche/alertemarche-backend:latest
    container_name: alertemarche_scheduler
    restart: always
    command: php artisan schedule:work
    env_file: .env
    depends_on:
      - app
    networks:
      - alertemarche

  nginx:
    image: nginx:alpine
    container_name: alertemarche_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/alertemarche.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - alertemarche

  postgres:
    image: postgres:15-alpine
    container_name: alertemarche_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - alertemarche

  redis:
    image: redis:7-alpine
    container_name: alertemarche_redis
    restart: always
    networks:
      - alertemarche

volumes:
  pgdata:

networks:
  alertemarche:
    driver: bridge
