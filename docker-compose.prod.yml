# AlerteMarché — Stack de PRODUCTION
# Déployée sur le VPS OVH, derrière Cloudflare (WAF / DDoS / SSL en mode Full).
# Nginx écoute en HTTP sur le port 80 ; Cloudflare gère le HTTPS.
#
# Arborescence attendue sur le serveur :
#   alertemarche/
#     ├── backend/    (dépôt alertemarche-backend)
#     ├── frontend/   (dépôt alertemarche-frontend)
#     ├── scrapers/   (dépôt alertemarche-scrapers)
#     └── infra/      (ce dépôt — on exécute docker compose ici)
#
# La configuration commune (clés API, DB, etc.) est lue depuis infra/.env

services:
  # ---- Application Laravel (PHP-FPM) ----
  app:
    build:
      context: ../backend
    image: alertemarche-backend:latest
    container_name: alertemarche_app
    restart: always
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - alertemarche

  # ---- Worker de file d'attente (IA, matching, notifications) ----
  queue:
    image: alertemarche-backend:latest
    container_name: alertemarche_queue
    restart: always
    command: php artisan queue:work --queue=ai,matching,notifications,default --tries=3 --timeout=120 --sleep=3
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - alertemarche

  # ---- Planificateur Laravel (tâches périodiques) ----
  scheduler:
    image: alertemarche-backend:latest
    container_name: alertemarche_scheduler
    restart: always
    command: php artisan schedule:work
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
    networks:
      - alertemarche

  # ---- Robots de collecte (Python) ----
  scrapers:
    build:
      context: ../scrapers
    image: alertemarche-scrapers:latest
    container_name: alertemarche_scrapers
    restart: always
    environment:
      BACKEND_API_URL: "http://nginx/api"
      SCRAPERS_API_TOKEN: "${SCRAPERS_API_TOKEN}"
      BENIN_SOURCE_URL: "${BENIN_SOURCE_URL:-https://armp.bj}"
      TOGO_SOURCE_URL: "${TOGO_SOURCE_URL:-https://armp.tg}"
      CI_SOURCE_URL: "${CI_SOURCE_URL:-https://www.anrmp.ci}"
      SCRAPE_INTERVAL_MINUTES: "${SCRAPE_INTERVAL_MINUTES:-120}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      - nginx
    networks:
      - alertemarche

  # ---- Serveur web / reverse-proxy ----
  nginx:
    image: nginx:alpine
    container_name: alertemarche_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/alertemarche.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - alertemarche

  # ---- Base de données ----
  postgres:
    image: postgres:15-alpine
    container_name: alertemarche_postgres
    restart: always
    environment:
      POSTGRES_DB: "${DB_DATABASE:-alertemarche}"
      POSTGRES_USER: "${DB_USERNAME:-alertemarche}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - alertemarche

  # ---- Cache / files ----
  redis:
    image: redis:7-alpine
    container_name: alertemarche_redis
    restart: always
    networks:
      - alertemarche

volumes:
  pgdata:
  app_storage:

networks:
  alertemarche:
    driver: bridge
